name: run-tests

on:
  push:
    branches:
      - master

jobs:
  test:
    runs-on: ${{ matrix.os }}
    services:
      opensearch:
        image: opensearchproject/opensearch:2.13.0
        env:
          discovery.type: single-node
          DISABLE_SECURITY_PLUGIN: true
          OPENSEARCH_JAVA_OPTS: -Xms512m -Xmx512m
        ports:
          - 9200:9200

    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest]
        php: [8.4, 8.3, 8.2]

    name: P${{ matrix.php }} - ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - name: Install dependencies
        run: composer update --prefer-dist --no-interaction

      - name: Wait for OpenSearch
        run: |
          for attempt in {1..60}; do
            if curl --fail --silent http://127.0.0.1:9200 > /dev/null; then
              exit 0
            fi

            sleep 1
          done

          echo "OpenSearch did not become available in time."
          docker logs "${{ job.services.opensearch.id }}"
          exit 1

      - name: Execute tests
        run: vendor/bin/pest tests/Integration tests/Unit --ci
        env:
          OPENSEARCH_HOST: http://127.0.0.1:9200
